name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - name: Set up MSYS2 with mingw-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-tools
            make

      - name: Build EXE and DLL
        run: |
          cd windows
          make CC=gcc WINDRES=windres

      - name: List artifacts
        run: |
          cd windows
          ls -lh uma_speed_trainer.exe uma_hook.dll

      - name: Upload Windows build
        uses: actions/upload-artifact@v5
        with:
          name: UmaSpeedTrainer-windows
          path: |
            windows/uma_speed_trainer.exe
            windows/uma_hook.dll
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/uma_speed_trainer.exe
            windows/uma_hook.dll
          generate_release_notes: false
          body: |
            ## UmaSpeedTrainer ${{ github.ref_name }}

            Windows build. See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for setup instructions.

            > Built automatically. Untested by the author. Claude wrote the Windows port.
